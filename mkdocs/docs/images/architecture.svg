<svg xmlns="http://www.w3.org/2000/svg" width="640" height="220" viewBox="0 0 640 220" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">
  <rect width="640" height="220" fill="#f7f8fa"/>
  <!-- Web front -->
  <rect x="30" y="80" width="160" height="60" rx="8" fill="#e8eefc" stroke="#3b5bdb" stroke-width="2"/>
  <text x="110" y="106" text-anchor="middle" font-size="15" fill="#1b2a5b">Web フロント</text>
  <text x="110" y="126" text-anchor="middle" font-size="12" fill="#3b5bdb">(React)</text>
  <!-- Backend -->
  <rect x="240" y="80" width="160" height="60" rx="8" fill="#e6f7ee" stroke="#2f9e44" stroke-width="2"/>
  <text x="320" y="106" text-anchor="middle" font-size="15" fill="#143d24">バックエンド API</text>
  <text x="320" y="126" text-anchor="middle" font-size="12" fill="#2f9e44">(FastAPI / Python)</text>
  <!-- DB -->
  <rect x="450" y="80" width="160" height="60" rx="8" fill="#fdecef" stroke="#e03131" stroke-width="2"/>
  <text x="530" y="114" text-anchor="middle" font-size="15" fill="#5b1116">PostgreSQL</text>
  <!-- arrows -->
  <line x1="190" y1="110" x2="240" y2="110" stroke="#868e96" stroke-width="2" marker-end="url(#a)" marker-start="url(#b)"/>
  <line x1="400" y1="110" x2="450" y2="110" stroke="#868e96" stroke-width="2" marker-end="url(#a)"/>
  <text x="215" y="100" text-anchor="middle" font-size="11" fill="#495057">REST API</text>
  <text x="425" y="100" text-anchor="middle" font-size="11" fill="#495057">SQL</text>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#868e96"/></marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="0" refY="3" orient="auto"><path d="M6,0 L0,3 L6,6 Z" fill="#868e96"/></marker>
  </defs>
  <text x="320" y="40" text-anchor="middle" font-size="16" fill="#212529">プロジェクト X システム構成</text>
</svg>
