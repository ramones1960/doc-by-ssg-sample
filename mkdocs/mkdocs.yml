site_name: 社内プロジェクト文書
site_description: プロジェクト Orbit の技術文書・運用ガイド
site_author: 開発チーム

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: ja

nav:
  - ホーム: index.md
  - 開発ガイド: getting-started.md
  - API リファレンス: api-reference.md
  - 議事録:
      - 2025年6月: meeting-notes/2025-06.md
